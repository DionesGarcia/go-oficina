<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>GO Oficina — Agenda de Serviços</title>

  <link rel="icon" type="image/svg+xml" href="favicon-go.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>

  <link rel="stylesheet" href="css/global.css">

  <style>
    /* ================= CONTEÚDO PRINCIPAL ================= */
    .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }

    /* TOPBAR COMPACTA COM RÉGUA ACOPLADA */
    .topbar { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; border-bottom: 1px solid var(--border-color); background: #070a0f; }
    .topbar-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .topbar-titles h2 { font-size: 21px; font-weight: 700; color: var(--text-bright); letter-spacing: -0.02em; }
    
    /* RÉGUA DE DIAS CORRIGIDA */
    .day-selector-ribbon { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .ribbon-btn { background: #121824; border: 1px solid var(--border-color); color: var(--text-main); font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; }
    .ribbon-btn:hover { background: #1a2334; color: #fff; border-color: #475569; }
    .ribbon-btn.active { background: rgba(255, 90, 0, 0.12); border-color: var(--brand-orange); color: var(--brand-orange); font-weight: 800; box-shadow: 0 0 10px rgba(255, 90, 0, 0.05); }

    /* BOTÕES DE AÇÃO RÁPIDA */
    .topbar-actions { display: flex; gap: 10px; align-items: center; }

    /* CONTAINER EXTRATO */
    .agenda-view-container { flex: 1; overflow-y: auto; padding: 24px 24px 40px 24px; display: flex; flex-direction: column; gap: 20px; }
    .agenda-view-container::-webkit-scrollbar { width: 6px; }
    .agenda-view-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    /* DIVISÓRIA DE DATA */
    .extrato-group-header { display: flex; align-items: center; gap: 12px; margin-top: 6px; margin-bottom: 2px; position: relative; z-index: 1; }
    .extrato-group-header span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--brand-green); background: rgba(0, 230, 118, 0.1); padding: 4px 12px; border-radius: 4px; border: 1px solid rgba(0, 230, 118, 0.15); }
    .extrato-group-header .divisoria-linha { flex: 1; height: 1px; background: var(--border-color); pointer-events: none; }

    /* CARD DA TABELA */
    .agenda-table-card { background: #0b0e14; border: 1px solid var(--border-color); border-radius: 8px; overflow: visible; margin-bottom: 12px; position: relative; z-index: 2; }
    
    .table-row { display: grid; grid-template-columns: 120px 1.2fr 1.6fr 130px 1.5fr 340px; align-items: center; padding: 16px 16px; border-bottom: 1px solid var(--border-color); transition: background 0.15s; min-height: 64px; position: relative; }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: rgba(255,255,255,0.01); }

    .table-header-row { display: grid; grid-template-columns: 120px 1.2fr 1.6fr 130px 1.5fr 340px; align-items: center; padding: 14px 16px; background: #0e121b; border-bottom: 1px solid var(--border-color); font-size: 12px; font-weight: 700; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.03em; border-top-left-radius: 7px; border-top-right-radius: 7px; }

    /* COLUNAS INTERNAS */
    .col-time { display: flex; flex-direction: column; gap: 2px; }
    .col-time .clock { font-size: 15px; font-weight: 700; color: var(--text-bright); font-family: monospace; }
    .col-time .date { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    
    /* Alerta de horário crítico */
    .col-time.critical-time .clock { color: #f97316; text-shadow: 0 0 10px rgba(249, 115, 22, 0.2); }
    .col-time.critical-time .date { color: #f97316; opacity: 0.8; }

    .col-type { font-size: 14px; font-weight: 600; color: var(--text-bright); padding-right: 6px; }
    
    .col-vinc { display: flex; flex-direction: column; gap: 4px; min-width: 0; padding-right: 8px; }
    .col-vinc .client { font-size: 14px; font-weight: 700; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .car-info-row { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; min-width: 0; }
    .car-text { font-size: 13px; font-weight: 500; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .col-status { display: flex; justify-content: flex-start; min-width: 0; padding-right: 10px; }
    .status-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 9px; border-radius: 4px; border: 1px solid rgba(255, 214, 0, 0.25); color: var(--brand-yellow); background: rgba(255, 214, 0, 0.08); white-space: nowrap; }
    .status-badge.aguardando { color: var(--brand-green); background: rgba(0, 230, 118, 0.08); border-color: rgba(0, 230, 118, 0.25); }

    .col-obs { font-size: 13px; color: #cbd5e1; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 5px; padding-right: 10px; }
    .col-obs .empty-obs { color: var(--text-muted); font-style: italic; opacity: 0.7; }

    /* BOTÕES OPERACIONAIS */

    .col-actions { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; width: 100%; position: relative; z-index: 100; }
    .btn-row-action { min-width: 104px; height: 32px; justify-content: center; background: #1a2233; border: 1px solid var(--border-color); color: var(--text-bright); font-size: 11px; font-weight: 700; text-transform: uppercase; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.2s; white-space: nowrap; position: relative; z-index: 101; padding: 0 10px; }
    .btn-row-action i { width: 13px; height: 13px; flex-shrink: 0; }
    .btn-row-action:hover { background: #24304a; border-color: #475569; }
    
    .btn-row-action.budget { border-color: rgba(255, 214, 0, 0.35); color: var(--brand-yellow); background: rgba(255, 214, 0, 0.04); }
    .btn-row-action.budget:hover { background: rgba(255, 214, 0, 0.12); }
    
    .btn-row-action.os { border-color: rgba(0, 176, 255, 0.35); color: var(--brand-blue); background: rgba(0, 176, 255, 0.04); }
    .btn-row-action.os:hover { background: rgba(0, 176, 255, 0.12); }

    .btn-row-action.start { border-color: rgba(0, 230, 118, 0.35); color: var(--brand-green); background: rgba(0, 230, 118, 0.05); }
    .btn-row-action.start:hover { background: rgba(0, 230, 118, 0.12); }
    .btn-row-action.reschedule { border-color: rgba(255, 214, 0, 0.32); color: var(--brand-yellow); background: rgba(255, 214, 0, 0.05); }
    .btn-row-action.reschedule:hover { background: rgba(255, 214, 0, 0.12); }

    .btn-row-action.cancel { border-color: rgba(239, 68, 68, 0.35); color: #ef4444; background: rgba(239, 68, 68, 0.04); }
    .btn-row-action.cancel:hover { background: rgba(239, 68, 68, 0.12); }

    .btn-row-action.done { min-width: 116px; color: var(--text-muted); cursor: default; opacity: 0.72; }

    /* Estilos dos modais de ação operacional */
    .btn-status-action { 
        width: 100%; 
        height: 48px; 
        border: none; 
        border-radius: 8px; 
        font-size: 14px; 
        font-weight: 700; 
        display: flex; 
        align-items: center; 
        justify-content: flex-start; 
        padding-left: 20px; 
        gap: 12px; 
        cursor: pointer; 
        transition: all 0.2s; 
    }
    .btn-status-action:hover { filter: brightness(0.9); transform: translateY(-1px); }
    .btn-status-action i { width: 18px; height: 18px; }

    .badge-waiting-accept { font-size: 10px; font-weight: 700; color: var(--brand-blue); background: rgba(0, 176, 255, 0.1); padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(0, 176, 255, 0.2); margin-right: 5px; white-space: nowrap; }

    .input-group-row { display: flex; gap: 8px; width: 100%; }
    .btn-inline-add { background: #1a2233; border: 1px solid var(--border-color); color: var(--brand-green); font-size: 12px; font-weight: 700; padding: 0 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; transition: all 0.2s; }
    .btn-inline-add:hover { background: rgba(0, 230, 118, 0.08); border-color: var(--brand-green); }

    select.form-control { padding: 0 8px; color-scheme: dark; }
    
    .whatsapp-svg-icon { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
  </style>
</head>
<body>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-header">
        <div class="topbar-titles">
          <h2>Agenda de Serviços</h2>
          
          <div class="day-selector-ribbon">
            <button class="ribbon-btn active" id="btn-filtra-hoje" onclick="mudarFiltroData('hoje')">Hoje</button>
            <button class="ribbon-btn" id="btn-filtra-amanha" onclick="mudarFiltroData('amanha')">Amanhã</button>
            <button class="ribbon-btn" id="btn-filtra-7dias" onclick="mudarFiltroData('7dias')">Próximos 7 dias</button>
            <button class="ribbon-btn" id="btn-filtra-tudo" onclick="mudarFiltroData('tudo')">Ver Tudo</button>
          </div>
        </div>
        
        <div class="topbar-actions">
          <button class="btn-top-action secondary" onclick="copiarLinkAgendamento()">
            <i style="width:14px; height:14px;" data-lucide="copy"></i> Copiar Link
          </button>
          <button class="btn-top-action secondary" style="color: var(--brand-whatsapp);" onclick="abrirModalLink()">
            <svg class="whatsapp-svg-icon" viewBox="0 0 24 24" style="width:15px; height:15px; fill:currentColor;">
              <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.003 5.324 5.328 0 11.822 0c3.148.001 6.107 1.227 8.332 3.457 2.225 2.229 3.446 5.19 3.445 8.34-.003 6.497-5.328 11.822-11.822 11.822-2.004-.001-3.971-.51-5.713-1.477L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.625 1.451 5.403 0 9.794-4.392 9.797-9.799.002-2.618-1.013-5.08-2.859-6.93C16.315 2.03 13.856.994 11.237 1a9.783 9.783 0 0 0-9.78 9.784c-.001 1.547.422 3.053 1.223 4.387l-.999 3.648 3.734-.979zm12.115-6.858c-.3-.15-1.774-.875-2.046-.975-.273-.1-.472-.15-.672.15-.2.3-.775.975-.95 1.174-.175.2-.35.225-.65.075-1.205-.6-2.031-1.095-2.83-2.463-.21-.36-.042-.556.108-.707.135-.134.3-.35.45-.525.15-.175.2-.3.3-.5s.05-.375-.025-.525C11.66 8.5 11 6.85 10.725 6.175c-.267-.652-.536-.549-.725-.549-.187-.001-.4-.001-.613-.001s-.562.08-.856.408c-.294.328-1.125 1.101-1.125 2.685 0 1.585 1.15 3.118 1.306 3.328.156.21 2.26 3.452 5.474 4.841.765.329 1.362.527 1.827.674.769.244 1.47.21 2.022.128.614-.092 1.774-.725 2.024-1.425.25-.7.25-1.3 1.175-1.425-.075-.125-.275-.275-.575-.425z"/>
            </svg> Enviar Link
          </button>
          <button class="btn-top-action primary" onclick="abrirModalManual()">
            <i style="width:16px; height:16px;" data-lucide="plus-circle"></i> Novo Agendamento
          </button>
        </div>
      </div>
    </header>

    <div class="agenda-view-container" id="container-extrato-agenda"></div>

    <footer class="footer-bar">
      <div style="display:flex; align-items:center; gap:6px; color:var(--brand-green); font-size:12px;"><span style="width:7px; height:7px; background:var(--brand-green); border-radius:50%;"></span> <span id="sync-status-label">Sincronizado</span></div>
      <div id="lbl-total-registros">Carregando...</div>
    </footer>
  </main>

  <div class="modal-overlay" id="modal-novo-manual">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Novo Agendamento</h3>
        <button class="btn-close-modal" onclick="fecharModalManual()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Cliente</label>
          <div class="input-group-row">
            <select id="sel-manual-cliente" class="form-control" onchange="carregarVeiculosDoCliente(this.value)">
              <option value="">Carregando clientes...</option>
            </select>
            <button class="btn-inline-add" onclick="abrirModalRapidoCliente()">
              <i style="width:14px; height:14px;" data-lucide="plus"></i> Novo
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Veículo do Cliente</label>
          <select id="sel-manual-veiculo" class="form-control">
            <option value="">Selecione um cliente primeiro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Data do Serviço</label>
          <input type="date" id="txt-manual-data" class="form-control">
        </div>
        <div class="form-group">
          <label>Horário</label>
          <input type="time" id="txt-manual-hora" class="form-control">
        </div>
        <div class="form-group">
          <label>Tipo de Serviço</label>
          <input type="text" id="txt-manual-tipo" class="form-control" placeholder="Ex: Troca de Óleo, Revisão Geral">
        </div>
        <div class="form-group">
          <label>Observações Adicionais</label>
          <input type="text" id="txt-manual-obs" class="form-control" placeholder="Ex: Troque filtro de ar">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="fecharModalManual()">Cancelar</button>
        <button class="btn-top-action primary" style="height:34px;" onclick="salvarAgendamentoManual()">Confirmar Agendamento</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-rapido-cliente" style="z-index: 1001;">
    <div class="modal-card" style="max-width: 400px;">
      <div class="modal-header">
        <h3>Cadastrar Novo Cliente</h3>
        <button class="btn-close-modal" onclick="fecharModalRapidoCliente()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nome Completo *</label>
          <input type="text" id="txt-novo-cli-nome" class="form-control" placeholder="Ex: João Silva">
        </div>
        <div class="form-group">
          <label>Telefone / WhatsApp</label>
          <input type="text" id="txt-novo-cli-telefone" class="form-control" placeholder="Ex: 42999999999">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="fecharModalRapidoCliente()">Voltar</button>
        <button class="btn-top-action primary" style="height:34px; background: var(--brand-green);" onclick="salvarClienteRapido()">Salvar Cliente</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-enviar-link">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Enviar Link de Agendamento</h3>
        <button class="btn-close-modal" onclick="fecharModalLink()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>WhatsApp do Cliente</label>
          <input type="text" id="txt-link-whatsapp" class="form-control" placeholder="Ex: 42999999999">
        </div>
        <div class="form-group">
          <label>Nome do Cliente (Opcional)</label>
          <input type="text" id="txt-link-nome" class="form-control" placeholder="Ex: Carlos">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="fecharModalLink()">Cancelar</button>
        <button class="btn-top-action" style="height:34px; color:#fff; background:var(--brand-whatsapp);" onclick="dispararLinkWhatsApp()">Disparar WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-iniciar-atendimento" style="z-index: 2000;">
    <div class="modal-card" style="max-width: 450px;">
      <div class="modal-header">
        <h3>Iniciar atendimento</h3>
        <button class="btn-close-modal" onclick="fecharModalAtendimento()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" style="display: flex; flex-direction: column; gap: 12px; padding: 24px;">
        <button class="btn-status-action" style="background: var(--brand-blue); color: #fff;" onclick="window.executarAtendimento('orcamento')">
            <i data-lucide="calculator"></i> Gerar orçamento
        </button>
        
        <button class="btn-status-action" style="background: var(--brand-green); color: #000;" onclick="window.executarAtendimento('os')">
            <i data-lucide="wrench"></i> Abrir O.S.
        </button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-remarcar-agendamento" style="z-index: 2000;">
    <div class="modal-card" style="max-width: 420px;">
      <div class="modal-header">
        <h3>Remarcar agendamento</h3>
        <button class="btn-close-modal" onclick="fecharModalRemarcacao()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nova data</label>
          <input type="date" id="txt-remarcar-data" class="form-control">
        </div>
        <div class="form-group">
          <label>Novo horário</label>
          <input type="time" id="txt-remarcar-hora" class="form-control">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="fecharModalRemarcacao()">Cancelar</button>
        <button class="btn-top-action primary" style="height:34px;" onclick="salvarRemarcacao()">Confirmar remarcação</button>
      </div>
    </div>
  </div>

<script>
'use strict';

let filtroDataAtual = 'hoje';
let agendamentoAtendimentoId = null;
let agendamentoRemarcacaoId = null;

// --- 1. FUNÇÕES GLOBAIS DE INTERAÇÃO (Disponíveis para o onclick) ---

window.abrirModalManual = function() {
    document.getElementById('modal-novo-manual').classList.add('active');
    carregarClientesForm();
};

window.fecharModalManual = function() {
    document.getElementById('modal-novo-manual').classList.remove('active');
};

window.abrirModalLink = function() {
    document.getElementById('modal-enviar-link').classList.add('active');
};

window.fecharModalLink = function() {
    document.getElementById('modal-enviar-link').classList.remove('active');
};

window.copiarLinkAgendamento = function() {
    const link = window.location.origin + '/agendar.html?oficina=' + OFICINA_ATIVA_ID;
    navigator.clipboard.writeText(link).then(() => {
        showToast('Link de agendamento copiado!', 'success');
    }).catch(err => {
        console.error('Erro ao copiar:', err);
        showToast('Erro ao copiar link', 'error');
    });
};

window.dispararLinkWhatsApp = function() {
    const fone = document.getElementById('txt-link-whatsapp').value.replace(/\D/g, '');
    const nome = document.getElementById('txt-link-nome').value.trim();
    if (!fone) { showToast('Informe o WhatsApp do cliente', 'error'); return; }
    
    const linkAgendar = window.location.origin + '/agendar.html?oficina=' + OFICINA_ATIVA_ID;
    const mensagem = `Olá${nome ? ' ' + nome : ''}! Use este link para realizar seu agendamento em nossa oficina: ${linkAgendar}`;
    
    window.open(`https://api.whatsapp.com/send?phone=55${fone}&text=${encodeURIComponent(mensagem)}`, '_blank');
    showToast('WhatsApp aberto!');
    fecharModalLink();
};

window.abrirModalRapidoCliente = function() {
    document.getElementById('modal-rapido-cliente').classList.add('active');
};

window.fecharModalRapidoCliente = function() {
    document.getElementById('modal-rapido-cliente').classList.remove('active');
};

window.abrirModalAtendimento = function(id) {
    agendamentoAtendimentoId = id;
    const modal = document.getElementById('modal-iniciar-atendimento');
    if (modal) {
        modal.classList.add('active');
        if (typeof lucide !== 'undefined') lucide.createIcons();
    } else {
        console.error("Modal de atendimento não encontrado!");
    }
};

window.fecharModalAtendimento = function() {
    document.getElementById('modal-iniciar-atendimento').classList.remove('active');
    agendamentoAtendimentoId = null;
};

window.executarAtendimento = async function(tipo) {
    try {
        if (tipo === 'orcamento') {
            await gerarOrcamentoFundo(agendamentoAtendimentoId);
        } else if (tipo === 'os') {
            await iniciarOSDiretaFlow(agendamentoAtendimentoId);
        }
        window.fecharModalAtendimento();
    } catch (e) {
        console.error(e);
        showToast("Erro ao iniciar atendimento", "error");
    }
};

window.abrirModalRemarcacao = function(id) {
    agendamentoRemarcacaoId = id;
    document.getElementById('txt-remarcar-data').value = '';
    document.getElementById('txt-remarcar-hora').value = '';
    document.getElementById('modal-remarcar-agendamento').classList.add('active');
};

window.fecharModalRemarcacao = function() {
    document.getElementById('modal-remarcar-agendamento').classList.remove('active');
    agendamentoRemarcacaoId = null;
};

window.salvarRemarcacao = async function() {
    const novaData = document.getElementById('txt-remarcar-data').value;
    const novoHorario = document.getElementById('txt-remarcar-hora').value;

    if (!agendamentoRemarcacaoId || !novaData || !novoHorario) {
        showToast("Informe nova data e horário", "error");
        return;
    }

    try {
        const { data: agendamentoAtual, error: errBusca } = await db.from('agendamentos')
            .select('*')
            .eq('id', agendamentoRemarcacaoId)
            .eq('oficina_id', OFICINA_ATIVA_ID)
            .single();
        if (errBusca) throw errBusca;

        const { error: errUpdate } = await db.from('agendamentos')
            .update({ status: 'REMARCADO' })
            .eq('id', agendamentoRemarcacaoId)
            .eq('oficina_id', OFICINA_ATIVA_ID);
        if (errUpdate) throw errUpdate;

        const novoAgendamento = {
            oficina_id: agendamentoAtual.oficina_id,
            cliente_id: agendamentoAtual.cliente_id,
            veiculo_id: agendamentoAtual.veiculo_id,
            servico_tipo: agendamentoAtual.servico_tipo,
            servico_data: novaData,
            horario: novoHorario,
            status: 'Aguardando',
            observacoes: agendamentoAtual.observacoes
        };

        const { error: errInsert } = await db.from('agendamentos').insert([novoAgendamento]);
        if (errInsert) throw errInsert;

        showToast("Agendamento remarcado", "success");
        window.fecharModalRemarcacao();
        renderizarAgendaExtrato();
    } catch (e) {
        console.error(e);
        showToast("Erro ao remarcar agendamento", "error");
    }
};

window.cancelarAgendamento = async function(id) {
    if (!confirm("Cancelar este agendamento? O registro será mantido no histórico.")) return;

    try {
        const { error } = await db.from('agendamentos')
            .update({ status: 'CANCELADO' })
            .eq('id', id)
            .eq('oficina_id', OFICINA_ATIVA_ID);
        if (error) throw error;

        showToast("Agendamento cancelado", "success");
        renderizarAgendaExtrato();
    } catch (e) {
        console.error(e);
        showToast("Erro ao cancelar agendamento", "error");
    }
};

// --- 2. LÓGICA DE NEGÓCIO (SUPABASE) ---

async function iniciarOSDiretaFlow(id) {
    try {
        await abrirOS(id);
    } catch (e) { console.error(e); showToast("Erro ao abrir O.S.", "error"); }
}

async function abrirOS(id) {
    try {
        const { data: orc, error: errOrc } = await db.from('orcamentos')
            .select('*, orcamento_itens(*)')
            .eq('agendamento_id', id)
            .eq('oficina_id', OFICINA_ATIVA_ID)
            .maybeSingle();
        if (errOrc) throw errOrc;

        const orcAprovado = orc && ['aprovado', 'aprovado_manual'].includes((orc.status || '').toLowerCase());
        const { data: agend, error: errAgend } = await db.from('agendamentos')
            .select('*')
            .eq('id', id)
            .eq('oficina_id', OFICINA_ATIVA_ID)
            .single();
        if (errAgend) throw errAgend;

        const osPayload = {
            oficina_id: OFICINA_ATIVA_ID,
            cliente_id: orcAprovado ? orc.cliente_id : agend.cliente_id,
            veiculo_id: orcAprovado ? orc.veiculo_id : agend.veiculo_id,
            agendamento_id: id,
            orcamento_id: orcAprovado ? orc.id : null,
            numero_os: "OS-" + Date.now(),
            valor_total: orcAprovado ? (orc.valor_total || 0) : 0,
            status: 'aberta',
            defeito_relatado: orcAprovado ? (orc.observacoes || null) : (agend.observacoes || null),
            observacoes: orcAprovado ? orc.observacoes : agend.observacoes
        };

        const { data: novaOS, error: errOS } = await db.from('ordens_servico').insert([osPayload]).select().single();
        if (errOS) throw errOS;

        if (orcAprovado && orc.orcamento_itens && orc.orcamento_itens.length > 0) {
            const itensOS = orc.orcamento_itens.map(i => ({ os_id: novaOS.id, tipo: i.tipo, descricao: i.descricao, quantidade: i.quantidade, valor_unitario: i.valor_unitario, valor_total: i.valor_total }));
            await db.from('ordem_servico_itens').insert(itensOS);
        }

        await db.from('agendamentos')
            .update({ status: 'EM EXECUÇÃO' })
            .eq('id', id)
            .eq('oficina_id', OFICINA_ATIVA_ID);
        showToast("O.S. #" + novaOS.id + " aberta!");
        
        // Redireciona para a tela de O.S.
        setTimeout(() => {
            window.location.href = `os.html?id=${OFICINA_ATIVA_ID}`;
        }, 1500);
    } catch(e) { console.error(e); showToast("Erro ao abrir O.S.", "error"); }
}

async function gerarOrcamentoFundo(id) {
    try {
        showToast("Gerando orçamento...", "info");
        const { data: orcExistente } = await db.from('orcamentos')
            .select('id')
            .eq('agendamento_id', id)
            .eq('oficina_id', OFICINA_ATIVA_ID)
            .maybeSingle();
        
        if (!orcExistente) {
            const { data: agend } = await db.from('agendamentos')
                .select('*')
                .eq('id', id)
                .eq('oficina_id', OFICINA_ATIVA_ID)
                .single();
            const orcPayload = {
                oficina_id: OFICINA_ATIVA_ID, cliente_id: agend.cliente_id, veiculo_id: agend.veiculo_id,
                agendamento_id: id, valor_pecas: 0, valor_servicos: 0, valor_total: 0, status: 'Rascunho',
                token_aprovacao: 'tk-' + Date.now(), observacoes: agend.observacoes
            };
            await db.from('orcamentos').insert([orcPayload]);
        }

        await db.from('agendamentos')
            .update({ status: 'EM ANÁLISE' })
            .eq('id', id)
            .eq('oficina_id', OFICINA_ATIVA_ID);
        showToast("Orçamento gerado", "success");
        renderizarAgendaExtrato();
    } catch (e) { console.error(e); showToast("Erro ao atualizar", "error"); }
}

// --- 3. RENDERIZAÇÃO E FILTROS ---

function mudarFiltroData(tipo) {
    filtroDataAtual = tipo;
    document.querySelectorAll('.ribbon-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('btn-filtra-' + tipo).classList.add('active');
    renderizarAgendaExtrato();
}

async function carregarClientesForm(selecionarId = null) {
    try {
        const { data: clientes } = await db.from('clientes')
            .select('id, nome')
            .eq('oficina_id', OFICINA_ATIVA_ID)
            .order('nome');
        const sel = document.getElementById('sel-manual-cliente');
        sel.innerHTML = '<option value="">-- Selecione o Cliente --</option>';
        clientes?.forEach(c => sel.innerHTML += `<option value="${c.id}" ${selecionarId == c.id ? 'selected' : ''}>${c.nome}</option>`);
        if(selecionarId) carregarVeiculosDoCliente(selecionarId);
    } catch (e) {}
}

async function carregarVeiculosDoCliente(clienteId) {
    const sel = document.getElementById('sel-manual-veiculo');
    if(!clienteId) { sel.innerHTML = '<option value="">Selecione um cliente</option>'; return; }
    const { data: veiculos } = await db.from('veiculos')
        .select('id, marca, modelo, placa')
        .eq('cliente_id', clienteId)
        .eq('oficina_id', OFICINA_ATIVA_ID);
    sel.innerHTML = veiculos?.length ? '<option value="">-- Selecione --</option>' : '<option value="">Nenhum veículo</option>';
    veiculos?.forEach(v => sel.innerHTML += `<option value="${v.id}">${v.marca} ${v.modelo} [${v.placa.toUpperCase()}]</option>`);
}

async function salvarAgendamentoManual() {
    const cId = document.getElementById('sel-manual-cliente').value;
    const d = document.getElementById('txt-manual-data').value;
    const h = document.getElementById('txt-manual-hora').value;
    if(!cId || !d || !h) { showToast("Preencha campos obrigatórios", "error"); return; }
    try {
        const payload = { oficina_id: OFICINA_ATIVA_ID, cliente_id: parseInt(cId), veiculo_id: document.getElementById('sel-manual-veiculo').value || null,
            servico_data: d, horario: h + ':00', servico_tipo: document.getElementById('txt-manual-tipo').value || 'Geral',
            status: 'Aguardando', observacoes: document.getElementById('txt-manual-obs').value || null };
        await db.from('agendamentos').insert([payload]);
        showToast("Agendado!"); document.getElementById('modal-novo-manual').classList.remove('active');
        renderizarAgendaExtrato();
    } catch(e) { showToast("Erro ao salvar", "error"); }
}

async function salvarClienteRapido() {
    const nome = document.getElementById('txt-novo-cli-nome').value.trim();
    const tel = document.getElementById('txt-novo-cli-telefone').value.trim();
    if(!nome) { showToast("Nome é obrigatório", "error"); return; }
    try {
        const { data, error } = await db.from('clientes').insert([{ 
            nome, 
            telefone: tel, 
            oficina_id: OFICINA_ATIVA_ID 
        }]).select().single();
        if(error) throw error;
        showToast("Cliente cadastrado!");
        fecharModalRapidoCliente();
        carregarClientesForm(data.id);
    } catch(e) { showToast("Erro ao salvar cliente", "error"); }
}

async function renderizarAgendaExtrato() {
    try {
        const hj = obterDataString(0), am = obterDataString(1), st = obterDataString(7);
        let query = db.from('agendamentos').select('*, clientes(nome), veiculos(marca, modelo, placa, ano), orcamentos(id, status)').eq('oficina_id', OFICINA_ATIVA_ID);
        if (filtroDataAtual === 'hoje') query = query.eq('servico_data', hj);
        else if (filtroDataAtual === 'amanha') query = query.eq('servico_data', am);
        else if (filtroDataAtual === '7dias') query = query.gte('servico_data', hj).lte('servico_data', st);
        const { data: lista, error: errQuery } = await query.order('servico_data').order('horario');
        
        if (errQuery) throw errQuery;

        const container = document.getElementById('container-extrato-agenda');
        container.innerHTML = '';
        document.getElementById('lbl-total-registros').innerText = `${lista?.length || 0} registro(s)`;

        // Atualiza status de sincronização
        const syncStatus = document.getElementById('sync-status-label');
        if (syncStatus) {
            syncStatus.innerText = "Sincronizado agora";
            syncStatus.parentElement.style.color = "var(--brand-green)";
        }

        if (!lista?.length) { container.innerHTML = '<p style="text-align:center; padding:40px;">Nada agendado.</p>'; return; }

        const grupos = {};
        lista.forEach(i => { const d = i.servico_data; if(!grupos[d]) grupos[d] = []; grupos[d].push(i); });

        const agora = new Date();
        const horaAtualMinutos = (agora.getHours() * 60) + agora.getMinutes();

        for (const dKey of Object.keys(grupos)) {
            let label = formatarDataBR(dKey);
            if(dKey === hj) label = "Hoje"; else if(dKey === am) label = "Amanhã";
            container.innerHTML += `<div class="extrato-group-header"><span>${label}</span><div class="divisoria-linha"></div></div>`;
            let bloco = `<div class="agenda-table-card"><div class="table-header-row"><div>Hora/Data</div><div>Serviço</div><div>Cliente/Veículo</div><div>Status</div><div>Obs</div><div style="text-align:right;">Ação</div></div>`;

            grupos[dKey].forEach(item => {
                const sL = String(item.status || '').toLowerCase();
                const isAg = sL.includes('aguard');
                const orc = item.orcamentos?.[0];
                const oS = orc?.status?.toLowerCase();
                
                // Lógica de Horário Crítico (Somente para hoje e status aguardando)
                let classeCritica = "";
                if (isAg && dKey === hj && item.horario) {
                    const [h, m] = item.horario.split(':').map(Number);
                    const horaAgendadaMinutos = (h * 60) + m;
                    // Se o horário já passou ou faltam menos de 15 minutos
                    if (horaAgendadaMinutos <= (horaAtualMinutos + 15)) {
                        classeCritica = "critical-time";
                    }
                }

                // Lógica de Observações Vazias
                let obsText = item.observacoes;
                let obsClass = "";
                if (!obsText || obsText.trim() === "" || obsText.trim() === "---") {
                    obsText = '<span class="empty-obs">Sem observações</span>';
                }

                const agendamentoIdSeguro = JSON.stringify(item.id);
                let btn = `
                    <button class="btn-row-action start" onclick="window.abrirModalAtendimento(${agendamentoIdSeguro})"><i data-lucide="play-circle"></i> Iniciar atendimento</button>
                    <button class="btn-row-action reschedule" onclick="window.abrirModalRemarcacao(${agendamentoIdSeguro})"><i data-lucide="calendar-clock"></i> Remarcar</button>
                    <button class="btn-row-action cancel" onclick="window.cancelarAgendamento(${agendamentoIdSeguro})"><i data-lucide="x-circle"></i> Cancelar</button>
                `;
                if (sL.includes('execução') || sL.includes('pátio') || sL.includes('aberta')) {
                    btn = `<button class="btn-row-action os" onclick="window.location.href='os.html?id=${OFICINA_ATIVA_ID}'"><i data-lucide="wrench"></i> Ver O.S.</button>`;
                } else if (sL.includes('cancel') || sL.includes('remarc') || sL.includes('faltou') || sL.includes('conclu') || sL.includes('entreg')) {
                    btn = `<span class="btn-row-action done"><i data-lucide="history"></i> Registrado</span>`;
                }

                // Pendência: Agendamentos vencidos há mais de 1 hora sem orçamento, O.S., remarcação ou cancelamento devem virar FALTOU automaticamente via automação futura.

                const badge = oS === 'enviado' ? '<span class="badge-waiting-accept">Aguardando Aceite</span>' : '';

                bloco += `<div class="table-row">
                    <div class="col-time ${classeCritica}"><span class="clock">${item.horario?.substring(0,5)}</span><span class="date">${formatarDataBR(item.servico_data)}</span></div>
                    <div class="col-type">${item.servico_tipo}</div>
                    <div class="col-vinc"><span class="client">${item.clientes?.nome || item.cliente_nome}</span><div class="car-info-row">${item.veiculos ? item.veiculos.marca + ' ' + item.veiculos.modelo : '---'}</div></div>
                    <div class="col-status"><span class="status-badge ${isAg?'aguardando':''}">${item.status}</span></div>
                    <div class="col-obs" title="${item.observacoes||''}"><i>${obsText}</i></div>
                    <div class="col-actions">${badge}${btn}</div>
                </div>`;
            });
            container.innerHTML += bloco + `</div>`;
        }
        lucide.createIcons();
    } catch (e) { console.error(e); }
}

window.onload = () => renderizarAgendaExtrato();

// Helpers para fechar modais adicionais
window.fecharModalManual = () => document.getElementById('modal-novo-manual').classList.remove('active');
window.fecharModalRapidoCliente = () => document.getElementById('modal-rapido-cliente').classList.remove('active');
window.fecharModalLink = () => document.getElementById('modal-enviar-link').classList.remove('active');

</script>
