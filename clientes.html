<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Mecânica Web — Gestão de Clientes</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 44 44' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='29' cy='22' r='8' stroke='%23FF5A00' stroke-width='1.5' stroke-dasharray='2 1'/%3E%3Cpath d='M29 11V13M29 31V33M18 22H20M38 22H40' stroke='%23FF5A00' stroke-width='1.5' stroke-linecap='round'/%3E%3Crect x='4' y='4' width='18' height='36' rx='4' stroke='%23FF5A00' stroke-width='2' fill='%231A1F26'/%3E%3Ccircle cx='13' cy='35' r='1.5' fill='%23FF5A00'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>

  <link rel="stylesheet" href="css/global.css">
</head>
<body>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-header">
        <div class="topbar-titles">
          <h2>Controle de Clientes</h2>
          <div class="search-input-wrapper" style="position: relative; margin-top: 8px; max-width: 400px; width: 100%;">
            <i data-lucide="search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; height: 16px;"></i>
            <input type="text" id="txt-busca-cliente" class="search-control" placeholder="Buscar cliente por nome ou telefone..." oninput="filtrarClientesLocal(this.value)" style="background: #121722; border: 1px solid var(--border-color); border-radius: 6px; height: 36px; padding: 0 12px 0 38px; color: #ffffff; font-size: 14px; width: 100%;">
          </div>
        </div>
        <div class="topbar-actions">
          <button class="btn-top-action" onclick="abrirModalCliente()"><i data-lucide="user-plus"></i> Novo Cliente</button>
        </div>
      </div>
    </header>

    <div class="content-body" style="flex: 1; overflow-y: auto; padding: 24px;">
      <div class="clients-grid" id="grid-clientes-lista" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;">
        </div>
    </div>

    <footer class="footer-bar">
      <div style="display:flex; align-items:center; gap:6px; color:var(--brand-green); font-size:12px;"><span style="width:7px; height:7px; background:var(--brand-green); border-radius:50%;"></span> Base de Clientes Integrada</div>
      <div id="lbl-total-clientes">Carregando clientes...</div>
    </footer>
  </main>

  <div class="drawer-overlay" id="overlay-drawer" onclick="fecharDrawerHistorico()" style="position: fixed; top: 0; right: 0; width: 100vw; height: 100vh; background: rgba(3, 5, 8, 0.7); backdrop-filter: blur(3px); z-index: 999; visibility: hidden; opacity: 0; transition: all 0.3s ease;">
    <div class="history-drawer" onclick="event.stopPropagation()" style="position: fixed; top: 0; right: -460px; width: 460px; height: 100vh; background: #0b0e14; border-left: 1px solid var(--border-color); box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 1000; transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column;">
      <div class="drawer-header" style="padding: 20px; background: #0e121b; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h3 id="drawer-cliente-nome" style="font-size: 18px; font-weight: 700; color: var(--text-bright);">Nome do Cliente</h3>
          <span style="font-size: 13px; color: var(--text-muted);" id="drawer-cliente-fone">Telefone</span>
        </div>
        <button class="btn-close-drawer" onclick="fecharDrawerHistorico()" style="background: none; border: none; color: var(--text-muted); cursor: pointer;"><i data-lucide="x"></i></button>
      </div>
      <div class="drawer-body" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;">
        
        <div>
          <div class="section-title" style="font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--brand-orange); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;"><i style="width:14px; height:14px;" data-lucide="car"></i> Veículos Registrados</div>
          <div class="drawer-cars-list" id="drawer-lista-veiculos" style="display: flex; flex-direction: column; gap: 8px;">
             </div>
        </div>

        <div>
          <div class="section-title" style="font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--brand-orange); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;"><i style="width:14px; height:14px;" data-lucide="history"></i> Histórico de Passagens (Pátio/Agenda)</div>
          <div class="timeline" id="drawer-timeline-historico" style="position: relative; padding-left: 20px; border-left: 2px solid var(--border-color); margin-left: 8px; display: flex; flex-direction: column; gap: 16px;">
             </div>
        </div>

      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-cliente">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Cadastrar Novo Cliente</h3>
        <button class="btn-close-modal" style="background:none; border:none; color:var(--text-muted);" onclick="fecharModalCliente()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Nome Completo *</label>
          <input type="text" id="txt-cad-nome" class="form-control" placeholder="Ex: Rogério da Silva">
        </div>
        <div class="form-group">
          <label>Telefone / WhatsApp</label>
          <input type="text" id="txt-cad-telefone" class="form-control" placeholder="Ex: 42999999999">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="fecharModalCliente()">Cancelar</button>
        <button class="btn-top-action" style="height:34px;" onclick="salvarNovoCliente()">Salvar Cliente</button>
      </div>
    </div>
  </div>

<script>
'use strict';

let cacheClientes = []; 

function abrirModalCliente() { document.getElementById('modal-cliente').classList.add('active'); }
function fecharModalCliente() { document.getElementById('modal-cliente').classList.remove('active'); }

async function carregarClientesSistema() {
    try {
        const { data: clientes, error } = await db.from('clientes').select('*').order('nome');
        if (error) throw error;
        cacheClientes = clientes || [];
        renderizarGridClientes(cacheClientes);
    } catch (e) {
        console.error(e);
        showToast("Erro ao carregar clientes", "error");
    }
}

function filtrarClientesLocal(termo) {
    const t = termo.toLowerCase().trim();
    if(!t) { renderizarGridClientes(cacheClientes); return; }
    const filtrados = cacheClientes.filter(c => 
        (c.nome || '').toLowerCase().includes(t) || 
        (c.telefone || '').includes(t)
    );
    renderizarGridClientes(filtrados);
}

function renderizarGridClientes(lista) {
    const grid = document.getElementById('grid-clientes-lista');
    document.getElementById('lbl-total-clientes').innerText = `${lista.length} cliente(s) encontrado(s)`;
    grid.innerHTML = '';
    if(lista.length === 0) {
        grid.innerHTML = `<p style="color: var(--text-muted); font-size: 14px; grid-column: 1/-1; text-align:center; padding: 40px;">Nenhum cliente encontrado.</p>`;
        return;
    }
    lista.forEach(cli => {
        grid.innerHTML += `
            <div class="client-card" onclick="verHistoricoCliente(${cli.id}, '${cli.nome.replace(/'/g, "\\'")}', '${cli.telefone || ''}')" style="background: #0b0e14; border: 1px solid var(--border-color); border-radius: 8px; padding: 18px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;">
                <div class="client-card-header" style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                    <div class="client-info">
                        <h4 style="font-size: 16px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px;">${cli.nome}</h4>
                        <span style="font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;"><i style="width:14px; height:14px; color: var(--brand-whatsapp);" data-lucide="phone"></i> ${cli.telefone || 'Sem telefone'}</span>
                    </div>
                </div>
                <div class="client-stats" style="border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 12px; display: flex; gap: 16px;">
                    <div class="stat-badge" style="font-size: 12px; font-weight: 600; color: #94a3b8; display: flex; align-items: center; gap: 4px;"><i data-lucide="chevron-right"></i> Ver Histórico Completo</div>
                </div>
            </div>
        `;
    });
    lucide.createIcons();
}

async function salvarNovoCliente() {
    const nome = document.getElementById('txt-cad-nome').value.trim();
    const telefone = document.getElementById('txt-cad-telefone').value.trim();
    if(!nome) { showToast("O nome do cliente é obrigatório.", "error"); return; }
    try {
        const { error } = await db.from('clientes').insert([{ nome, telefone }]);
        if(error) throw error;
        showToast("Cliente cadastrado com sucesso!");
        fecharModalCliente();
        document.getElementById('txt-cad-nome').value = '';
        document.getElementById('txt-cad-telefone').value = '';
        carregarClientesSistema();
    } catch (e) {
        console.error(e);
        showToast("Erro ao salvar cliente.", "error");
    }
}

async function verHistoricoCliente(clienteId, nomeCliente, foneCliente) {
    document.getElementById('drawer-cliente-nome').innerText = nomeCliente;
    document.getElementById('drawer-cliente-fone').innerText = foneCliente ? `WhatsApp: ${foneCliente}` : 'Sem telefone';
    document.getElementById('overlay-drawer').style.visibility = 'visible';
    document.getElementById('overlay-drawer').style.opacity = '1';
    document.querySelector('.history-drawer').style.right = '0';

    const boxVeiculos = document.getElementById('drawer-lista-veiculos');
    const boxTimeline = document.getElementById('drawer-timeline-historico');
    boxVeiculos.innerHTML = '<p style="font-size:12px; color:var(--text-muted)">Buscando...</p>';
    boxTimeline.innerHTML = '<p style="font-size:12px; color:var(--text-muted)">Buscando...</p>';

    try {
        const { data: veiculos } = await db.from('veiculos').select('*').eq('cliente_id', clienteId);
        boxVeiculos.innerHTML = veiculos?.length ? '' : '<p style="font-size:13px; color:var(--text-muted)">Nenhum veículo.</p>';
        veiculos?.forEach(v => {
            boxVeiculos.innerHTML += `
                <div class="mini-car-card" style="background: #121722; border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center;">
                    <span class="car-name" style="font-size: 14px; font-weight: 600; color: var(--text-bright);">${v.marca} ${v.modelo}</span>
                    <span class="plate-badge-mini">${(v.placa || '').toUpperCase().replace(/[-]/g,'')}</span>
                </div>
            `;
        });

        const { data: passagens } = await db.from('agendamentos').select('*').eq('cliente_id', clienteId).order('servico_data', { ascending: false });
        boxTimeline.innerHTML = passagens?.length ? '' : '<p style="font-size:13px; color:var(--text-muted)">Sem histórico.</p>';
        passagens?.forEach(p => {
            boxTimeline.innerHTML += `
                <div class="timeline-item" style="position: relative;">
                    <div class="timeline-dot" style="position: absolute; left: -27px; top: 4px; width: 12px; height: 12px; background: #0b0e14; border: 2px solid var(--brand-orange); border-radius: 50%;"></div>
                    <div class="timeline-box" style="background: #121722; border: 1px solid var(--border-color); border-radius: 6px; padding: 12px;">
                        <div class="timeline-meta" style="display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px;">
                            <span>${formatarDataBR(p.servico_data)}</span>
                            <span style="color: var(--brand-yellow);">${p.status || 'Pátio'}</span>
                        </div>
                        <div class="timeline-title" style="font-size: 13px; font-weight: 700; color: var(--text-bright);">${p.servico_tipo || 'Geral'}</div>
                    </div>
                </div>
            `;
        });
    } catch (e) { console.error(e); }
}

function fecharDrawerHistorico() {
    document.getElementById('overlay-drawer').style.opacity = '0';
    document.querySelector('.history-drawer').style.right = '-460px';
    setTimeout(() => document.getElementById('overlay-drawer').style.visibility = 'hidden', 300);
}

window.onload = carregarClientesSistema;
</script>
</body>
</html>
