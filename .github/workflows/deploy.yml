name: Deploy GO Oficina para Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploy via FTP
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Puxando o código do repositório
      uses: actions/checkout@v4
    
    - name: 📂 Sincronizando arquivos com a Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: public_html/oficina/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
