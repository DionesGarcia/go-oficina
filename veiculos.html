<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>GO Oficina — Gestão de Veículos</title>

  <link rel="icon" type="image/svg+xml" href="favicon-go.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>

  <link rel="stylesheet" href="css/global.css">

  <style>
    .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; position: relative; }
    
    .topbar { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; flex-shrink: 0; border-bottom: 1px solid var(--border-color); background: #070a0f; }
    .topbar-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    
    .search-input-wrapper { position: relative; margin-top: 8px; max-width: 400px; width: 100%; }
    .search-input-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; height: 16px; }
    .search-control { background: #121722; border: 1px solid var(--border-color); border-radius: 6px; height: 36px; padding: 0 12px 0 38px; color: #ffffff; font-size: 14px; width: 100%; }

    .content-body { flex: 1; overflow-y: auto; padding: 24px; }
    .vehicles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

    .vehicle-card { background: #0b0e14; border: 1px solid var(--border-color); border-radius: 8px; padding: 18px; display: flex; flex-direction: column; gap: 12px; transition: all 0.2s; }
    .vehicle-card:hover { border-color: #475569; background: #0f131c; }

    .vehicle-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .vehicle-info h4 { font-size: 16px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
    .vehicle-info span { font-size: 13px; color: var(--text-muted); }

    .plate-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }

    .owner-info { border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 4px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
    .owner-info i { width: 14px; height: 14px; color: var(--brand-orange); }
  </style>
</head>
<body>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-header">
        <div class="topbar-titles">
          <h2 style="font-size: 21px; font-weight: 700; color: var(--text-bright);">Frota de Veículos</h2>
          <div class="search-input-wrapper">
            <i data-lucide="search"></i>
            <input type="text" id="txt-busca-veiculo" class="search-control" placeholder="Buscar por placa, modelo ou dono..." oninput="filtrarVeiculos(this.value)">
          </div>
        </div>
        <div class="topbar-actions">
          <button class="btn-top-action primary" onclick="abrirModalVeiculo()"><i data-lucide="plus-circle"></i> Novo Veículo</button>
        </div>
      </div>
    </header>

    <div class="content-body">
      <div class="vehicles-grid" id="grid-veiculos">
          <!-- Lista carregada via JS -->
      </div>
    </div>

    <footer class="footer-bar">
      <div style="display:flex; align-items:center; gap:6px; color:var(--brand-green); font-size:12px;"><span style="width:7px; height:7px; background:var(--brand-green); border-radius:50%;"></span> Cadastro de Ativos Ativo</div>
      <div id="lbl-total-veiculos">Carregando frota...</div>
    </footer>
  </main>

  <div class="modal-overlay" id="modal-veiculo">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Cadastrar Novo Veículo</h3>
        <button class="btn-close-modal" onclick="fecharModalVeiculo()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Proprietário (Cliente)</label>
          <select id="sel-veiculo-cliente" class="form-control">
            <option value="">Carregando clientes...</option>
          </select>
        </div>
        <div class="config-row">
            <div class="form-group">
                <label>Marca</label>
                <input type="text" id="txt-v-marca" class="form-control" placeholder="Ex: VW, Fiat">
            </div>
            <div class="form-group">
                <label>Modelo</label>
                <input type="text" id="txt-v-modelo" class="form-control" placeholder="Ex: Gol, Uno">
            </div>
        </div>
        <div class="config-row">
            <div class="form-group">
                <label>Placa</label>
                <input type="text" id="txt-v-placa" class="form-control" placeholder="Ex: ABC1D23" style="text-transform: uppercase;">
            </div>
            <div class="form-group">
                <label>Ano</label>
                <input type="number" id="txt-v-ano" class="form-control" placeholder="2024">
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="fecharModalVeiculo()">Cancelar</button>
        <button class="btn-top-action primary" style="height:34px;" onclick="salvarVeiculo()">Salvar Veículo</button>
      </div>
    </div>
  </div>

<script>
'use strict';

let cacheVeiculos = [];

function abrirModalVeiculo() { 
    document.getElementById('modal-veiculo').classList.add('active'); 
    carregarClientesVeiculo();
}
function fecharModalVeiculo() { document.getElementById('modal-veiculo').classList.remove('active'); }

async function carregarClientesVeiculo() {
    const sel = document.getElementById('sel-veiculo-cliente');
    sel.innerHTML = '<option value="">Carregando...</option>';
    const { data } = await db.from('clientes')
        .select('id, nome')
        .eq('oficina_id', OFICINA_ATIVA_ID)
        .order('nome');
    sel.innerHTML = '<option value="">-- Selecione o Cliente --</option>';
    if(data) data.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
}

async function carregarFrota() {
    try {
        const { data, error } = await db.from('veiculos')
            .select('*, clientes(nome)')
            .eq('oficina_id', OFICINA_ATIVA_ID)
            .order('id', { ascending: false });
        if(error) throw error;
        cacheVeiculos = data || [];
        renderizarGridVeiculos(cacheVeiculos);
    } catch(e) { console.error(e); showToast("Erro ao carregar frota", "error"); }
}

function renderizarGridVeiculos(lista) {
    const grid = document.getElementById('grid-veiculos');
    document.getElementById('lbl-total-veiculos').innerText = `${lista.length} veículo(s) cadastrado(s)`;
    grid.innerHTML = '';

    if(lista.length === 0) {
        grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; padding:40px; color:var(--text-muted);">Nenhum veículo encontrado.</p>';
        return;
    }

    lista.forEach(v => {
        const placa = (v.placa || '').toUpperCase();
        grid.innerHTML += `
            <div class="vehicle-card">
                <div class="vehicle-header">
                    <div class="vehicle-info">
                        <h4>${v.marca} ${v.modelo}</h4>
                        <span>Ano: ${v.ano || 'N/A'}</span>
                        <div class="plate-row">
                            <span class="plate-badge-mini">${placa.replace(/[-]/g,'')}</span>
                        </div>
                    </div>
                    <i data-lucide="car" style="color: var(--border-color); width: 32px; height: 32px;"></i>
                </div>
                <div class="owner-info">
                    <i data-lucide="user"></i>
                    <span>Dono: <b>${v.clientes?.nome || 'Desconhecido'}</b></span>
                </div>
            </div>
        `;
    });
    lucide.createIcons();
}

function filtrarVeiculos(termo) {
    const t = termo.toLowerCase().trim();
    const filtrados = cacheVeiculos.filter(v => 
        (v.marca + v.modelo).toLowerCase().includes(t) || 
        (v.placa || '').toLowerCase().includes(t) ||
        (v.clientes?.nome || '').toLowerCase().includes(t)
    );
    renderizarGridVeiculos(filtrados);
}

async function salvarVeiculo() {
    const clienteId = document.getElementById('sel-veiculo-cliente').value;
    const marca = document.getElementById('txt-v-marca').value.trim();
    const modelo = document.getElementById('txt-v-modelo').value.trim();
    const placa = document.getElementById('txt-v-placa').value.trim();
    const ano = document.getElementById('txt-v-ano').value;

    if(!clienteId || !marca || !placa) { showToast("Preencha os campos obrigatórios", "error"); return; }

    try {
        const { error } = await db.from('veiculos').insert([{
            oficina_id: OFICINA_ATIVA_ID,
            cliente_id: parseInt(clienteId),
            marca, modelo, placa, ano: ano ? parseInt(ano) : null
        }]);

        if(error) throw error;
        showToast("Veículo cadastrado com sucesso!");
        fecharModalVeiculo();
        carregarFrota();
    } catch(e) { console.error(e); showToast("Erro ao salvar veículo", "error"); }
}

window.onload = carregarFrota;
</script>
</body>
</html>
